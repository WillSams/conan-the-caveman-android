name: Android Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # publish the debug APK to Releases on main

    steps:
      - name: Checkout (with engine + vendored SDL submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      # Caching app/.cxx skips the ~10-15 min SDL + FreeType NDK rebuild on
      # every run after the first green build.
      - name: Cache Gradle + native build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
          key: android-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'app/jni/CMakeLists.txt') }}
          restore-keys: |
            android-${{ runner.os }}-

      - name: Build debug APK (arm64-v8a only)
        run: ./gradlew assembleDebug -Pabi=arm64-v8a --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish a rolling "latest" debug build to Releases (main only). It's
      # debug-signed with a fresh keystore each run, so uninstall any prior copy
      # before reinstalling on a device.
      - name: Publish latest debug APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          body: |
            Rolling debug APK built from `main` (commit ${{ github.sha }}).

            Debug-signed — uninstall any previous copy before reinstalling.
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
