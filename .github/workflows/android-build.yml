name: Android Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with engine + vendored SDL submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      # Caching app/.cxx skips the ~10-15 min SDL + FreeType NDK rebuild on
      # every run after the first green build.
      - name: Cache Gradle + native build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            app/.cxx
          key: android-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'app/jni/CMakeLists.txt') }}
          restore-keys: |
            android-${{ runner.os }}-

      - name: Build debug APK (arm64-v8a only)
        run: ./gradlew assembleDebug -Pabi=arm64-v8a --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
